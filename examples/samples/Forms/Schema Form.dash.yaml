datasets:
  - uuid: transaction
    content: >-
      [
        [1, "TXN-2026-04521", 125000, "USD", "true", "2026-07-06", "2026-07-06T14:30:00Z", "Multiple rapid transfers to high-risk jurisdictions.", "Acme Holdings Ltd", "Shell Corp 42 LLC"]
      ]
    columns:
      - id: id
        type: NUMBER
      - id: transactionId
        type: TEXT
      - id: amount
        type: NUMBER
      - id: currency
        type: LABEL
      - id: flagged
        type: LABEL
      - id: reportDate
        type: DATE
      - id: detectedAt
        type: DATE
      - id: notes
        type: TEXT
      - id: sender
        type: TEXT
      - id: receiver
        type: TEXT

pages:
  - name: Schema Form
    dataScope:
      dataset: transaction
      idColumn: id
    save:
      trigger: auto
      delay: 1000
      adapter: local
    components:
      - type: title
        properties:
          text: "Form Inputs"
          size: h2

      - type: markdown
        properties:
          content: |
            Same AML transaction payload, three approaches. **Schema** passes
            one JSON Schema — full automation. **HTML** uses `type: html` for
            full layout control. **YAML** uses DSL form inputs — flat fields
            only.

      - type: tabs
        properties:
          targetPage: true
        tabs:
          Schema:
            components:
              - type: html
                properties:
                  content: <schema-form-demo></schema-form-demo>

          HTML:
            components:
              - type: markdown
                properties:
                  content: |
                    Raw HTML via `type: html` — full layout control including
                    nesting and arrays. More verbose, but no DSL limitations.

              - type: html
                properties:
                  content: >
                    <div style="font-family:var(--pages-font-family,system-ui,sans-serif);font-size:14px;">
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">TransactionId</label><input type="text" value="TXN-2026-04521" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Amount</label><input type="number" value="125000" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Currency</label><select style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;"><option selected>USD</option><option>EUR</option><option>GBP</option></select></div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" checked style="width:18px;height:18px;" /> Flagged</label></div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">ReportDate</label><input type="date" value="2026-07-06" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">DetectedAt</label><input type="datetime-local" value="2026-07-06T14:30" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Notes</label><textarea rows="4" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;font-family:inherit;background:#fff;color:#333;box-sizing:border-box;resize:vertical;">Multiple rapid transfers to high-risk jurisdictions.</textarea></div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;">
                        <span style="font-size:14px;font-weight:500;color:#333;">Parties</span>
                        <div style="padding-left:16px;border-left:2px solid #e0e0e0;">
                          <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Sender</label><input type="text" value="Acme Holdings Ltd" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                          <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Receiver</label><input type="text" value="Shell Corp 42 LLC" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                        </div>
                      </div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;">
                        <span style="font-size:14px;font-weight:500;color:#333;">Tags</span>
                        <div style="padding-left:16px;border-left:2px solid #e0e0e0;">
                          <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;"><input type="text" value="high-risk" style="flex:1;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;" /></div>
                          <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;"><input type="text" value="cross-border" style="flex:1;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;" /></div>
                          <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;"><input type="text" value="layering" style="flex:1;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;" /></div>
                        </div>
                      </div>
                      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;">
                        <span style="font-size:14px;font-weight:500;color:#333;">LinkedTransactions</span>
                        <div style="padding-left:16px;border-left:2px solid #e0e0e0;">
                          <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee;">
                            <span style="font-size:12px;font-weight:500;color:#888;">1.</span>
                            <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Id</label><input type="text" value="TXN-2026-04519" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                            <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Amount</label><input type="number" value="50000" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                          </div>
                          <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee;">
                            <span style="font-size:12px;font-weight:500;color:#888;">2.</span>
                            <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Id</label><input type="text" value="TXN-2026-04520" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                            <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"><label style="font-size:14px;font-weight:500;color:#333;">Amount</label><input type="number" value="75000" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;background:#fff;color:#333;box-sizing:border-box;" /></div>
                          </div>
                        </div>
                      </div>
                    </div>

          YAML:
            components:
              - type: markdown
                properties:
                  content: |
                    Pure YAML DSL — each field wired individually. No nesting,
                    no array editing, no display mode, no datetime-local.

              - text-input:
                  field: transactionId
                  label: Transaction ID
                  required: true

              - number-input:
                  field: amount
                  label: Amount
                  min: 0

              - dropdown:
                  field: currency
                  label: Currency
                  options:
                    values:
                      - USD
                      - EUR
                      - GBP

              - checkbox:
                  field: flagged
                  label: Flagged

              - date-picker:
                  field: reportDate
                  label: Report Date

              - date-picker:
                  field: detectedAt
                  label: Detected At

              - textarea:
                  field: notes
                  label: Notes
                  rows: 4

              - text-input:
                  field: sender
                  label: Sender

              - text-input:
                  field: receiver
                  label: Receiver
