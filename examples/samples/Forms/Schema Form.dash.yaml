pages:
  - name: Schema Form
    components:
      - type: title
        properties:
          text: "pages-schema-form"
          size: h2

      - type: markdown
        properties:
          content: |
            Pass a JSON Schema and data — get a complete form. Toggle between
            **display** (read-only) and **edit** (interactive) modes. Supports
            nested objects, arrays with add/remove, required field validation,
            and a pluggable field renderer registry.

      - type: html
        properties:
          content: <schema-form-demo></schema-form-demo>
