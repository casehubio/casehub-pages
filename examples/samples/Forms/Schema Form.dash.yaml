pages:
  - name: Schema Form
    components:
      - type: title
        properties:
          text: "pages-schema-form"
          size: h2

      - type: markdown
        properties:
          content: |
            **`<pages-schema-form>`** renders a JSON Schema as a complete form
            automatically — no manual field wiring needed.

            **What it adds beyond individual form inputs:**

            | Capability | Individual inputs | pages-schema-form |
            |---|---|---|
            | Schema-driven rendering | Manual per field | Automatic from JSON Schema |
            | Display mode (read-only) | Not available | Built-in formatted display |
            | Nested objects | Not supported | Recursive sub-forms |
            | Array editing | Not supported | Add / remove items |
            | Form-level submit | Per-field events | Collected data + validation |
            | Custom format renderers | N/A | Pluggable registry |

            Switch to the **TypeScript** tab to see the full API — all field types,
            nested objects, arrays, display/edit toggle, submit with validation,
            and custom format renderers.
