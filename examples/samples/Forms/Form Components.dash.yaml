datasets:
  - uuid: sample
    content: >-
      [
        [1, "Example entry", "Option A", 42, "true", "2024-06-15", "Some notes"]
      ]
    columns:
      - id: id
        type: NUMBER
      - id: name
        type: TEXT
      - id: category
        type: LABEL
      - id: quantity
        type: NUMBER
      - id: active
        type: LABEL
      - id: startDate
        type: DATE
      - id: notes
        type: TEXT

pages:
  - name: Form Components
    dataScope:
      dataset: sample
      idColumn: id
    save:
      trigger: auto
      delay: 1000
      adapter: local
    components:
      - type: title
        properties:
          text: Form Input Components
          size: h2

      - type: markdown
        properties:
          content: >
            All available form input types. Each input is bound to a dataset
            field via `dataScope`. Changes save automatically.

      - type: title
        properties:
          text: Text Inputs
          size: h3

      - text-input:
          field: name
          label: Full Name
          placeholder: Enter your name
          required: true

      - textarea:
          field: notes
          label: Notes
          placeholder: Additional comments...
          rows: 4

      - type: title
        properties:
          text: Selection Inputs
          size: h3

      - dropdown:
          field: category
          label: Category
          options:
            values:
            - Option A
            - Option B
            - Option C

      - number-input:
          field: quantity
          label: Quantity
          min: 0
          max: 100

      - date-picker:
          field: startDate
          label: Start Date

      - checkbox:
          field: active
          label: Active
