pages:
  - name: Column Settings
    components:
      - type: title
        properties:
          text: Column Formatting
          size: h2

      - type: markdown
        properties:
          content: >
            **Column settings** control how values display — number patterns,
            date formats, and expressions that transform cell content.

      - type: table
        properties:
          lookup:
            uuid: sales
          sortable: true
          columns:
            - id: salary
              pattern: "$#,###"
            - id: growth
              pattern: "#.#%"
