datasets:
  - uuid: employees
    content: >
      [
        ["Alice Chen", "Engineering", "Staff Engineer", "142000"],
        ["Bob Kim", "Engineering", "Senior Engineer", "128000"],
        ["Carlos Ruiz", "Product", "Product Manager", "140000"],
        ["Diana Park", "Design", "Lead Designer", "135000"],
        ["Eve Johnson", "Engineering", "Junior Engineer", "82000"],
        ["Frank Lee", "Product", "Product Analyst", "95000"],
        ["Grace Wu", "Design", "UX Researcher", "112000"],
        ["Henry Zhang", "Engineering", "DevOps Engineer", "125000"]
      ]
    columns:
      - id: name
        type: TEXT
      - id: department
        type: LABEL
      - id: role
        type: TEXT
      - id: salary
        type: NUMBER

  - uuid: budgets
    content: >
      [
        ["Engineering", "2400000", "Engineering division annual budget"],
        ["Product", "1200000", "Product division annual budget"],
        ["Design", "800000", "Design division annual budget"]
      ]
    columns:
      - id: department
        type: LABEL
      - id: budget
        type: NUMBER
      - id: note
        type: TEXT

  - uuid: combined
    join:
      - employees
      - budgets

pages:
  - name: Dataset Join
    components:
      - type: title
        properties:
          text: Dataset Join
          size: h2

      - type: markdown
        properties:
          content: >
            **join** merges multiple datasets into one. The `combined` dataset
            below joins `employees` and `budgets` — both contribute their columns.
            Components bound to the joined dataset see all columns from all sources.

      - type: tabs
        properties:
          targetPage: true
        tabs:
          Joined Table:
            components:
              - type: markdown
                properties:
                  content: >
                    The joined dataset includes columns from both `employees`
                    and `budgets`. Rows are merged by matching column values.
              - type: table
                properties:
                  lookup:
                    uuid: combined
                  sortable: true

          Source — Employees:
            components:
              - type: table
                properties:
                  lookup:
                    uuid: employees
                  sortable: true

          Source — Budgets:
            components:
              - type: table
                properties:
                  lookup:
                    uuid: budgets
                  sortable: true
