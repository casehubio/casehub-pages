pages:
  - name: Grouped Roadmap
    components:
      - type: title
        properties:
          text: Cross-Repo Roadmap — Multi-Level Grouped View
          size: h2

      - type: markdown
        properties:
          content: |
            Demonstrates **recursive multi-level grouping**: data grouped by Phase (top level),
            then by Status (sub-level). Tables render at leaf nodes only. Each level has
            independent expand/collapse.

      - type: legend
        properties:
          entries:
            - label: devtown
              color: "#1976d2"
            - label: blocks
              color: "#7cb342"
            - label: blocks-ui
              color: "#f57c00"
            - label: pages
              color: "#e91e63"
            - label: parent
              color: "#607d8b"
            - label: work
              color: "#5c6bc0"
          layout: linear

      - type: grouped-view
        style:
          border: "1px solid var(--pages-neutral-4, #e5e5e5)"
          border-radius: "var(--pages-radius-md, 8px)"
          overflow: hidden
          padding: "var(--pages-space-2, 8px)"
        properties:
          lookup:
            uuid: roadmap
          groupBy:
            - column: phase
            - column: status
          preset: sectioned
          defaultExpanded: true
          showGroupSummary: true
          rowAccent:
            column: status
            colorMap:
              newly-done: "#2e7d32"
              critical: "#d32f2f"
              blocked: "#e65100"
          rowStyle:
            - condition: "#{row.status} == 'done'"
              style:
                backgroundColor: "#f0faf0"
                color: "#2d7d2d"
            - condition: "#{row.status} == 'newly-done'"
              style:
                backgroundColor: "#e8f5e9"
                color: "#2e7d32"
            - condition: "#{row.status} == 'blocked'"
              style:
                backgroundColor: "#fff8f0"
                color: "#b35900"
            - condition: "#{row.status} == 'critical'"
              style:
                backgroundColor: "#fff0f0"
            - condition: "#{row.status} == 'new'"
              style:
                backgroundColor: "#f0f5ff"
