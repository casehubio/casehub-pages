pages:
  - name: Pagination and Search
    components:
      - type: tabs
        properties:
          targetPage: true
        tabs:
          Pagination:
            components:
              - type: markdown
                properties:
                  content: >
                    **Page size** controls how many rows display at once. Navigate
                    between pages using the built-in pagination controls.
              - type: table
                properties:
                  lookup:
                    uuid: employees
                  pageSize: 5
                  sortable: true

          Search Filter:
            components:
              - type: markdown
                properties:
                  content: >
                    **Selector** with text search narrows the table by department.
                    Select a department label to filter the table below.
              - type: selector
                properties:
                  lookup:
                    uuid: employees
                    operations:
                      - type: group
                        columnGroup: department
                  subtype: labels
              - type: table
                properties:
                  lookup:
                    uuid: employees
                  pageSize: 8
                  sortable: true

          Small Pages:
            components:
              - type: markdown
                properties:
                  content: >
                    **Compact view** — 3 rows per page for dense dashboards.
              - type: table
                properties:
                  lookup:
                    uuid: employees
                  pageSize: 3
